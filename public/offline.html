<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#050505" />
    <title>GoalTracker Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background: #050505;
        color: #ffffff;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      main {
        max-width: 420px;
        border: 1px solid #1a1a1a;
        border-radius: 24px;
        background: #0d0d0d;
        padding: 28px;
      }
      .logo {
        width: 56px;
        height: 56px;
        display: grid;
        place-items: center;
        border-radius: 20px;
        background: #34d399;
        color: #050505;
        font-size: 28px;
        font-weight: 900;
        margin-bottom: 20px;
      }
      p {
        color: #a1a1aa;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="logo">G</div>
      <h1>GoalTracker is offline</h1>
      <p>Previously visited pages can load offline. Reconnect to sync goals, reflections, achievements, and analytics.</p>
    </main>
  </body>
</html>
